<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yun-Ze Zheng's personal page featuring real-time local clock and premium design.">
    <title>Yun-Ze Zheng - Personal Page</title>
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ambient-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="card">
        <div class="profile-ring">
            <div class="profile-inner">YZ</div>
        </div>

        <h1 id="name">Yun-Ze Zheng</h1>
        <div class="subtitle">Personal Dashboard</div>

        <div class="clock-container">
            <div class="time-label">
                <span class="pulse-dot"></span>
                Local Time
            </div>
            <div class="time" id="clock">00:00:00</div>
            <div class="date" id="date">Loading...</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Time Formatting
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            // Date Formatting
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        // Initialize clock immediately
        updateClock();

        // Update clock every second
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
